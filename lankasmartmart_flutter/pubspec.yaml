name: lankasmartmart_flutter
description: "Lanka Smart Mart - Local shopping and delivery app built with Flutter."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0

  # Google Services
  google_sign_in: ^6.1.5
  google_maps_flutter: ^2.5.0

  # State Management (Riverpod)
  riverpod: ^2.4.8
  flutter_riverpod: ^2.4.8

  # Navigation
  go_router: ^12.0.0

  # Image handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  cloudinary_flutter: ^1.3.0

  # UI & Material Design
  google_fonts: ^6.1.0
  
  # Location services
  geolocator: ^10.1.0
  location: ^5.0.1

  # Sensors (for shake detection)
  sensors_plus: ^3.1.0

  # Payment & Card scanning (optional - can be added later)
  flutter_credit_card: ^4.0.1

  # HTTP
  http: ^1.1.0
  dio: ^5.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  
  # Camera
  camera: ^0.10.5+5

  # Local storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Toast notifications
  fluttertoast: ^8.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
